---
# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/refs/heads/main/schema/helm-testsuite.json

suite: lb test

templates:
  - lb.yaml

tests:
  - it: should create when using default values
    set:
      service.loadBalancer.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service

  - it: should create when service.enabled == true
    set:
      service.enabled: true
      service.loadBalancer.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service
      - matchRegex:
          path: metadata.name
          pattern: RELEASE-NAME-lb

  - it: adds additional ports
    set:
      service.loadBalancer.enabled: true
      service.additionalPorts:
        - name: bongo
          port: 8080
          protocol: TCP
          targetPort: bongo
    asserts:
      - equal:
          path: spec.ports[1].name
          value: bongo
      - equal:
          path: spec.ports[1].port
          value: 8080
      - equal:
          path: spec.ports[1].protocol
          value: TCP
      - equal:
          path: spec.ports[1].targetPort
          value: bongo
