version: "3"

tasks:
  test:
    cmds:
      - helm unittest chart/

  nestedSchemas:
    desc: Generate nested schemas
    internal: true
    silent: true
    dir: chart/schemas
    cmds:
      - |
        for file in *.yaml; do
          helm schema --use-helm-docs --bundle --bundle-without-id --k8s-schema-version=v1.35.1 -f "$file" -o "${file%.*}.schema.json"
        done

  schema:
    desc: Generate the schema for the chart
    dir: chart
    sources:
      - "*.yaml"
      - "**/*.yaml"
    cmds:
      - task: nestedSchemas
      - helm schema --use-helm-docs --bundle --bundle-without-id --k8s-schema-version=v1.35.1
      - helm schema --use-helm-docs --bundle --bundle-without-id --k8s-schema-version=v1.35.1 -f subchart.yaml -o subchart.schema.json

  dev:
    desc: Run the schema, docs and tests
    watch: true
    sources:
      - "*.yaml"
      - "**/*.yaml"
    cmds:
      - task: schema
      - task: test

  release:
    env:
      TAG: "{{ .TAG }}"
    preconditions:
      - sh: "[[ ! -z $TAG ]]"
        msg: Please set the tag
      - sh: 'echo $TAG | grep -E "^[0-9]+\.[0-9]+\.[0-9]+$"'
        msg: Please provide tag in format X.X.X
    cmds:
      - yq -i '.version = strenv(TAG)' chart/Chart.yaml
      - sleep 1
      - git add chart/Chart.yaml
      - git commit -m "Updated chart to v$TAG"
      - git push
      - git tag "v$TAG"
      - git push origin "v$TAG"
